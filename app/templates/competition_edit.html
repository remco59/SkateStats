{% extends "base.html" %}
{% block content %}
  <h1>Bewerk wedstrijd</h1>

  {% if error %}
    <section class="card">
      <div class="hint" style="color:#ffb86b;">
        {% if error == "date" %}
          Ongeldige datum. Gebruik de date picker.
        {% else %}
          Er ging iets mis.
        {% endif %}
      </div>
    </section>
  {% endif %}

  <section class="card">
    <form method="post" action="/competitions/{{ comp.id }}/edit" class="form">
      <label>Naam
        <input name="name" value="{{ comp.name }}" required />
      </label>

      <label>Baan / Locatie
        <input name="venue" value="{{ comp.venue or '' }}" />
      </label>

      <label>Datum
        <div class="date-input">
          <input class="date-input-text" name="competition_date" value="{{ fmt_date(comp.competition_date)|replace('-', '/') }}" placeholder="dd/mm/jjjj" inputmode="numeric" required />
          <input class="date-input-picker" type="date" value="{{ comp.competition_date }}" tabindex="-1" aria-hidden="true" />
          <button class="date-input-trigger" type="button" aria-label="Open kalender">📅</button>
        </div>
      </label>

      <label>Notities
        <input name="notes" value="{{ comp.notes or '' }}" />
      </label>

      <div class="row-actions">
        <button type="submit">Opslaan</button>
        <a class="btn" href="/competitions/{{ comp.id }}">Annuleren</a>
      </div>
    </form>
  </section>
{% endblock %}
