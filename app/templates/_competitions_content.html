<div id="competitions-content">
  {% if error_message %}
    <section class="card">
      <div class="hint hint-warning">{{ error_message }}</div>
    </section>
  {% endif %}

  <section class="card" id="competition-filters-panel" {% if not filters_open %}hidden{% endif %}>
    <form method="get" action="/competitions" class="form" id="competition-filter-form">
      <input type="hidden" name="q" value="{{ selected_query }}" />
      <label>Locatie
        <select name="venue">
          <option value="">Alle locaties</option>
          {% for venue_row in venue_options %}
            <option value="{{ venue_row.venue }}" {% if selected_venue == venue_row.venue %}selected{% endif %}>{{ venue_row.venue }}</option>
          {% endfor %}
        </select>
      </label>

      <div class="grid2">
        <label>Datum vanaf
          <div class="date-input">
            <input class="date-input-text" name="date_from" value="{{ selected_date_from|replace('-', '/') }}" placeholder="dd/mm/jjjj" inputmode="numeric" />
            <input class="date-input-picker" type="date" value="{{ selected_date_from }}" tabindex="-1" aria-hidden="true" />
            <button class="date-input-trigger" type="button" aria-label="Open kalender"><span class="line-md-icon" style="--icon-url:url('/static/icons/line-md/calendar.svg');" aria-hidden="true"></span></button>
          </div>
        </label>

        <label>Datum t/m
          <div class="date-input">
            <input class="date-input-text" name="date_to" value="{{ selected_date_to|replace('-', '/') }}" placeholder="dd/mm/jjjj" inputmode="numeric" />
            <input class="date-input-picker" type="date" value="{{ selected_date_to }}" tabindex="-1" aria-hidden="true" />
            <button class="date-input-trigger" type="button" aria-label="Open kalender"><span class="line-md-icon" style="--icon-url:url('/static/icons/line-md/calendar.svg');" aria-hidden="true"></span></button>
          </div>
        </label>
      </div>

      <div class="row-actions">
        <button type="submit">Filteren</button>
        <a class="btn" href="/competitions" data-reset="true">Reset</a>
      </div>
    </form>
  </section>

  <section class="card">
    {% if comps|length == 0 %}
      <p>Geen wedstrijden gevonden.</p>
    {% else %}
      <table>
        <thead>
          <tr><th>Datum</th><th>Naam</th><th>Locatie</th></tr>
        </thead>
        <tbody>
          {% for c in comps %}
            <tr data-competition-href="/competitions/{{ c.id }}">
              <td class="mono">{{ fmt_date(c.competition_date) }}</td>
              <td><a href="/competitions/{{ c.id }}">{{ c.name }}</a></td>
              <td>{{ c.venue or "-" }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% endif %}
  </section>
</div>
