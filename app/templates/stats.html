{% extends "base.html" %}
{% block content %}
  <h1>Statistieken</h1>
  {% include "_stats_content.html" %}

  <script>
    (function () {
      async function updateStatsContent(searchParams) {
        const currentContent = document.getElementById("stats-content");
        if (!currentContent) {
          return;
        }

        const url = new URL("/partial/stats-content", window.location.origin);
        url.search = searchParams.toString();
        currentContent.classList.add("is-loading");
        currentContent.setAttribute("aria-busy", "true");

        try {
          const response = await fetch(url.toString(), { headers: { "X-Requested-With": "fetch" } });
          if (!response.ok) {
            throw new Error("stats partial fetch failed");
          }

          const html = await response.text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          const nextContent = doc.getElementById("stats-content");
          if (!nextContent) {
            throw new Error("stats partial missing root");
          }

          currentContent.replaceWith(nextContent);
          bindStatsFilters(nextContent);

          const nextUrl = new URL(window.location.href);
          nextUrl.search = searchParams.toString();
          window.history.replaceState({}, "", nextUrl.toString());
        } catch (error) {
          window.location.assign(searchParams.toString() ? `/stats?${searchParams.toString()}` : "/stats");
        }
      }

      function bindStatsFilters(root) {
        const form = (root || document).querySelector("#stats-filter-form");
        if (!form || form.dataset.dynamicBound === "true") {
          return;
        }

        form.dataset.dynamicBound = "true";
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          updateStatsContent(new URLSearchParams(new FormData(form)));
        });

        form.querySelectorAll("select").forEach((select) => {
          select.addEventListener("change", () => {
            updateStatsContent(new URLSearchParams(new FormData(form)));
          });
        });

        const resetLink = form.querySelector("a[href='/stats']");
        if (resetLink) {
          resetLink.addEventListener("click", (event) => {
            event.preventDefault();
            updateStatsContent(new URLSearchParams());
          });
        }
      }

      bindStatsFilters(document);
    })();
  </script>
{% endblock %}
