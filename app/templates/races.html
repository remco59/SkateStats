{% extends "base.html" %}
{% block content %}
  <div class="row">
    <h1>Ritten</h1>
    <div class="page-actions">
      <a class="btn" href="/races/new">Nieuwe rit</a>
      <button
        type="button"
        class="btn btn-secondary"
        id="race-filters-toggle"
        aria-expanded="{% if filters_open %}true{% else %}false{% endif %}"
        aria-controls="race-filters-panel"
      >
        Filters
      </button>
    </div>
  </div>

  {% include "_races_content.html" %}

  <script>
    (function () {
      const toggle = document.getElementById("race-filters-toggle");

      function syncToggleState(root) {
        const panel = (root || document).querySelector("#race-filters-panel");
        if (!toggle || !panel) {
          return;
        }
        toggle.setAttribute("aria-expanded", panel.hidden ? "false" : "true");
        toggle.onclick = () => {
          const open = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", open ? "false" : "true");
          panel.hidden = open;
        };
      }

      async function updateRacesContent(searchParams) {
        const currentContent = document.getElementById("races-content");
        if (!currentContent) {
          return;
        }

        const url = new URL("/partial/races-content", window.location.origin);
        url.search = searchParams.toString();
        currentContent.classList.add("is-loading");
        currentContent.setAttribute("aria-busy", "true");

        try {
          const response = await fetch(url.toString(), { headers: { "X-Requested-With": "fetch" } });
          if (!response.ok) {
            throw new Error("races partial fetch failed");
          }

          const html = await response.text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          const nextContent = doc.getElementById("races-content");
          if (!nextContent) {
            throw new Error("races partial missing root");
          }

          currentContent.replaceWith(nextContent);
          bindRacesContent(nextContent);
          syncToggleState(document);

          const nextUrl = new URL(window.location.href);
          nextUrl.search = searchParams.toString();
          window.history.replaceState({}, "", nextUrl.toString());
        } catch (error) {
          window.location.assign(searchParams.toString() ? `/races?${searchParams.toString()}` : "/races");
        }
      }

      function bindRacesContent(root) {
        const scope = root || document;
        const form = scope.querySelector("#race-filter-form");
        if (form && form.dataset.dynamicBound !== "true") {
          form.dataset.dynamicBound = "true";
          form.addEventListener("submit", (event) => {
            event.preventDefault();
            updateRacesContent(new URLSearchParams(new FormData(form)));
          });

          const resetLink = form.querySelector("[data-reset='true']");
          if (resetLink) {
            resetLink.addEventListener("click", (event) => {
              event.preventDefault();
              updateRacesContent(new URLSearchParams());
            });
          }
        }

        if (window.initDateInputs) {
          window.initDateInputs(scope);
        }

        scope.querySelectorAll("tbody tr[data-race-href]").forEach((row) => {
          if (row.dataset.rowBound === "true") {
            return;
          }
          row.dataset.rowBound = "true";
          row.addEventListener("click", (event) => {
            const link = event.target.closest("a");
            if (!link) {
              window.location.href = row.dataset.raceHref;
            }
          });
        });
      }

      bindRacesContent(document);
      syncToggleState(document);
    })();
  </script>
{% endblock %}
